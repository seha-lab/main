<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>3D 로봇청소기</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
<script>
  // 씬, 카메라, 렌더러 설정
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xf0f0f0);

  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(5, 5, 5);

  const renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // 조명
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
  scene.add(ambientLight);

  const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
  directionalLight.position.set(5, 10, 7.5);
  scene.add(directionalLight);

  // OrbitControls
  const controls = new THREE.OrbitControls(camera, renderer.domElement);

  // 바닥
  const floorGeometry = new THREE.PlaneGeometry(20, 20);
  const floorMaterial = new THREE.MeshStandardMaterial({color: 0xdddddd});
  const floor = new THREE.Mesh(floorGeometry, floorMaterial);
  floor.rotation.x = -Math.PI / 2;
  scene.add(floor);

  // 로봇청소기 그룹
  const vacuum = new THREE.Group();
  scene.add(vacuum);

  // 본체
  const bodyGeometry = new THREE.CylinderGeometry(1, 1, 0.3, 64);
  const bodyMaterial = new THREE.MeshStandardMaterial({color: 0x2194ce, metalness: 0.3, roughness: 0.7});
  const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
  vacuum.add(body);

  // 상단 센서(돔)
  const sensorGeometry = new THREE.SphereGeometry(0.2, 32, 32);
  const sensorMaterial = new THREE.MeshStandardMaterial({color: 0xff0000, metalness: 0.5, roughness: 0.2});
  const sensor = new THREE.Mesh(sensorGeometry, sensorMaterial);
  sensor.position.set(0, 0.25, 0);
  vacuum.add(sensor);

  // 바퀴 2개 (옆면)
  function createWheel(x, z) {
    const wheelGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.05, 32);
    const wheelMat = new THREE.MeshStandardMaterial({color: 0x333333, metalness: 0.5, roughness: 0.6});
    const wheel = new THREE.Mesh(wheelGeo, wheelMat);
    wheel.rotation.z = Math.PI / 2;
    wheel.position.set(x, -0.15, z);
    return wheel;
  }

  vacuum.add(createWheel(0.6, 0.6));
  vacuum.add(createWheel(-0.6, 0.6));
  vacuum.add(createWheel(0.6, -0.6));
  vacuum.add(createWheel(-0.6, -0.6));

  // 레이더/센서 라이트 효과 (옵션)
  const radarLight = new THREE.PointLight(0xff5555, 1, 3);
  radarLight.position.set(0, 0.25, 0);
  vacuum.add(radarLight);

  // 애니메이션
  function animate() {
    requestAnimationFrame(animate);
    vacuum.rotation.y += 0.002; // 천천히 회전
    controls.update();
    renderer.render(scene, camera);
  }

  animate();

  // 창 크기 조절
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>
</body>
</html>
