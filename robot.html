<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>3D 무한성 애니메이션</title>
<style>
  body { margin:0; overflow:hidden; }
  canvas { display:block; }
</style>
</head>
<body>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

// --- 씬, 카메라, 렌더러 ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 2000);
camera.position.set(0, 20, 50);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// --- 빛 설정 ---
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
directionalLight.position.set(50, 50, 50);
scene.add(directionalLight);

// --- 오브젝트 생성 ---
const objects = [];
const geomTypes = [
    new THREE.BoxGeometry(2,2,2),
    new THREE.SphereGeometry(1.2,16,16),
    new THREE.CylinderGeometry(1,1,2,16)
];
const colors = [0xff0000,0xff9900,0xffff00,0x00ff00,0x00ffff,0x0000ff,0xff00ff];

for(let i=0;i<150;i++){
    const geom = geomTypes[Math.floor(Math.random()*geomTypes.length)];
    const mat = new THREE.MeshStandardMaterial({
        color: colors[Math.floor(Math.random()*colors.length)],
        emissive: 0xffffff,
        emissiveIntensity: Math.random()*0.5+0.5,
        roughness: 0.4,
        metalness: 0.7
    });
    const mesh = new THREE.Mesh(geom, mat);
    mesh.position.set(
        (Math.random()-0.5)*300,
        (Math.random()-0.5)*300,
        (Math.random()-0.5)*300
    );
    mesh.userData = {
        speed: Math.random()*0.03+0.005,
        scaleDir: Math.random()>0.5?1:-1
    };
    scene.add(mesh);
    objects.push(mesh);
}

// --- 배경 별점 ---
const starGeo = new THREE.BufferGeometry();
const starCount = 500;
const starPos = [];
for(let i=0;i<starCount;i++){
    starPos.push((Math.random()-0.5)*400);
    starPos.push((Math.random()-0.5)*400);
    starPos.push((Math.random()-0.5)*400);
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos,3));
const starMat = new THREE.PointsMaterial({color:0xffffff, size:0.5});
const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

// --- 카메라 움직임 변수 ---
let camAngle = 0;

// --- 애니메이션 루프 ---
function animate(){
    requestAnimationFrame(animate);

    // 오브젝트 회전 + 스케일 + 튀는 느낌
    objects.forEach(obj=>{
        obj.rotation.x += obj.userData.speed;
        obj.rotation.y += obj.userData.speed*1.5;

        obj.scale.x += 0.01*obj.userData.scaleDir;
        obj.scale.y += 0.01*obj.userData.scaleDir;
        obj.scale.z += 0.01*obj.userData.scaleDir;
        if(obj.scale.x>2 || obj.scale.x<0.5) obj.userData.scaleDir *= -1;

        // 랜덤 튀기기 효과
        obj.position.y += Math.sin(Date.now()*0.001 + obj.position.x) * 0.05;
        obj.position.x += Math.cos(Date.now()*0.001 + obj.position.z) * 0.05;
    });

    // 카메라 원형 이동 + 약간 높이 흔들림
    camAngle += 0.002;
    camera.position.x = Math.sin(camAngle)*200;
    camera.position.z = Math.cos(camAngle)*200;
    camera.position.y = 50 + Math.sin(camAngle*2)*20;
    camera.lookAt(0,0,0);

    renderer.render(scene,camera);
}
animate();

// --- 창 크기 변경 대응 ---
window.addEventListener('resize', ()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
